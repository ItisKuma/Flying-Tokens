<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Status</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", sans-serif;
        background: #171924;
        color: #f3f4f8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100vh;
      }

      body {
        width: 66vw;
        min-width: 290px;
        max-width: 360px;
        padding: 14px;
        background:
          radial-gradient(circle at top, rgba(111, 140, 255, 0.18), transparent 32%),
          #171924;
      }

      main {
        display: grid;
        gap: 14px;
      }

      section {
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 18px;
      }

      h2 {
        font-size: 14px;
        color: #bfc7ff;
      }

      p {
        color: #b5b9ca;
        line-height: 1.4;
      }

      button,
      input[type="range"] {
        width: 100%;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        color: inherit;
        background: #657cff;
        cursor: pointer;
      }

      button:hover {
        background: #7890ff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .tab-bar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .tab-button {
        background: rgba(101, 124, 255, 0.14);
        border: 1px solid rgba(148, 164, 255, 0.22);
      }

      .tab-button.is-active {
        background: #657cff;
        border-color: transparent;
      }

      .token-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
      }

      .token-row {
        display: grid;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.18);
      }

      .token-row__header {
        display: grid;
        gap: 4px;
      }

      .token-row__name {
        font-weight: 600;
      }

      .token-row__summary {
        color: #ffd978;
        font-size: 13px;
        font-weight: 700;
      }

      .token-row__statuses {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .status-button {
        width: auto;
        min-width: 84px;
        background: rgba(101, 124, 255, 0.2);
        border: 1px solid rgba(148, 164, 255, 0.28);
      }

      .status-button:hover {
        background: rgba(101, 124, 255, 0.32);
      }

      .status-button.is-active {
        background: #657cff;
        border-color: transparent;
      }

      .token-row__slider {
        display: grid;
        gap: 6px;
      }

      .token-row__slider-value {
        color: #ffd978;
        font-size: 13px;
        font-weight: 700;
      }

      .ui-slider {
        appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        outline: none;
        transition: background 120ms ease, box-shadow 120ms ease;
      }

      .ui-slider:hover,
      .ui-slider:focus-visible,
      .ui-slider:active {
        background: rgba(255, 217, 120, 0.26);
        box-shadow: 0 0 0 1px rgba(255, 217, 120, 0.24);
      }

      .ui-slider::-webkit-slider-thumb {
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 2px solid rgba(15, 17, 24, 0.8);
        background: #d9def7;
        box-shadow: 0 0 0 0 rgba(255, 217, 120, 0);
        transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
        cursor: ew-resize;
      }

      .ui-slider::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 2px solid rgba(15, 17, 24, 0.8);
        background: #d9def7;
        box-shadow: 0 0 0 0 rgba(255, 217, 120, 0);
        transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
        cursor: ew-resize;
      }

      .ui-slider:hover::-webkit-slider-thumb,
      .ui-slider:focus-visible::-webkit-slider-thumb,
      .ui-slider:active::-webkit-slider-thumb {
        transform: scale(1.12);
        background: #ffd978;
        box-shadow: 0 0 0 6px rgba(255, 217, 120, 0.14);
      }

      .ui-slider:hover::-moz-range-thumb,
      .ui-slider:focus-visible::-moz-range-thumb,
      .ui-slider:active::-moz-range-thumb {
        transform: scale(1.12);
        background: #ffd978;
        box-shadow: 0 0 0 6px rgba(255, 217, 120, 0.14);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="tab-bar">
        <button type="button" class="tab-button" data-tab-target="selected">Selected</button>
        <button type="button" class="tab-button" data-tab-target="scene">Token Status</button>
      </div>

      <section id="tab-panel-selected" class="stack">
        <h2>Selected</h2>
        <p id="selected-token-empty">Select a character token in the scene.</p>
        <ul id="selected-token-list" class="token-list"></ul>
      </section>

      <section id="tab-panel-scene" class="stack" hidden>
        <h2>Token Status</h2>
        <p id="scene-token-empty">No character tokens in this scene.</p>
        <ul id="scene-token-list" class="token-list"></ul>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
