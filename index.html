<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Status</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Roboto", "Segoe UI", sans-serif;
        background: transparent;
        color: #f3f4f8;
      }

      * {
        box-sizing: border-box;
      }

      :not(html):not(body)::-webkit-scrollbar {
        background-color: transparent;
        border-radius: 100px;
      }

      :not(html):not(body)::-webkit-scrollbar:vertical {
        width: 10px;
      }

      :not(html):not(body)::-webkit-scrollbar:horizontal {
        height: 10px;
      }

      :not(html):not(body)::-webkit-scrollbar:hover {
        background-color: rgba(255, 255, 255, 0.09);
      }

      :not(html):not(body)::-webkit-scrollbar-thumb {
        background-color: rgba(255, 255, 255, 0.5);
        border-radius: 16px;
        background-clip: padding-box;
        border: 2px solid transparent;
      }

      :not(html):not(body)::-webkit-scrollbar-thumb:vertical {
        min-height: 10px;
      }

      :not(html):not(body)::-webkit-scrollbar-thumb:horizontal {
        min-width: 10px;
      }

      :not(html):not(body)::-webkit-scrollbar-thumb:active {
        background-color: rgba(255, 255, 255, 0.61);
      }

      html,
      body {
        margin: 0;
        min-height: 100vh;
        background: transparent;
      }

      body {
        width: 100%;
        max-width: none;
        min-width: 0;
        height: 100vh;
        padding: 0;
        background: transparent;
        overflow: hidden;
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 0;
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }

      .app-header {
        overflow: hidden;
      }

      .app-content {
        min-height: 0;
        overflow: hidden;
      }

      .tab-strip {
        display: flex;
        gap: 24px;
        align-items: flex-start;
        padding: 12px 16px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }

      .tab-button {
        width: auto;
        padding: 0 0 14px;
        border-radius: 0;
        background: transparent;
        border: 0;
        border-bottom: 2px solid transparent;
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.95rem;
        font-weight: 500;
        letter-spacing: 0;
        text-transform: none;
      }

      .tab-button:hover {
        background: transparent;
        color: #ffffff;
      }

      .tab-button.is-active {
        background: transparent;
        color: #c295ff;
        border-bottom-color: #c295ff;
      }

      .tab-panel[hidden] {
        display: none;
      }

      .tab-panel {
        height: 100%;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 16px;
      }

      section {
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: none;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 18px;
      }

      h2 {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.92);
        font-weight: 600;
      }

      p {
        color: rgba(255, 255, 255, 0.68);
        line-height: 1.4;
      }

      button,
      input[type="range"] {
        width: 100%;
      }

      button {
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        color: rgba(255, 255, 255, 0.92);
        background: rgba(255, 255, 255, 0.04);
        cursor: pointer;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .section-actions {
        display: flex;
        gap: 8px;
      }

      .section-actions > button {
        width: auto;
      }

      .setting-row {
        display: grid;
        gap: 8px;
      }

      .setting-row__header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
      }

      .setting-row__value {
        color: #ffd978;
        font-size: 13px;
        font-weight: 700;
      }

      .setting-row__range {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: #b5b9ca;
        font-size: 12px;
      }

      .token-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
      }

      .token-row {
        display: grid;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: none;
      }

      .token-row__header {
        display: grid;
        gap: 4px;
      }

      .token-row__name {
        font-weight: 600;
      }

      .token-row__summary {
        color: #ffd978;
        font-size: 13px;
        font-weight: 700;
      }

      .token-row__statuses {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .status-button {
        width: auto;
        min-width: 84px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.16);
      }

      .status-button:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .status-button.is-active {
        background: rgba(194, 149, 255, 0.16);
        border-color: rgba(194, 149, 255, 0.52);
        color: #f2e6ff;
      }

      .token-row__slider {
        display: grid;
        gap: 6px;
      }

      .token-row__slider-value {
        color: #ffd978;
        font-size: 13px;
        font-weight: 700;
      }

      .ui-slider {
        appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        outline: none;
        transition: background 120ms ease, box-shadow 120ms ease;
      }

      .ui-slider:hover,
      .ui-slider:focus-visible,
      .ui-slider:active {
        background: rgba(255, 217, 120, 0.26);
        box-shadow: 0 0 0 1px rgba(255, 217, 120, 0.24);
      }

      .ui-slider::-webkit-slider-thumb {
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 2px solid rgba(15, 17, 24, 0.8);
        background: #d9def7;
        box-shadow: 0 0 0 0 rgba(255, 217, 120, 0);
        transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
        cursor: ew-resize;
      }

      .ui-slider::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 2px solid rgba(15, 17, 24, 0.8);
        background: #d9def7;
        box-shadow: 0 0 0 0 rgba(255, 217, 120, 0);
        transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
        cursor: ew-resize;
      }

      .ui-slider:hover::-webkit-slider-thumb,
      .ui-slider:focus-visible::-webkit-slider-thumb,
      .ui-slider:active::-webkit-slider-thumb {
        transform: scale(1.12);
        background: #ffd978;
        box-shadow: 0 0 0 6px rgba(255, 217, 120, 0.14);
      }

      .ui-slider:hover::-moz-range-thumb,
      .ui-slider:focus-visible::-moz-range-thumb,
      .ui-slider:active::-moz-range-thumb {
        transform: scale(1.12);
        background: #ffd978;
        box-shadow: 0 0 0 6px rgba(255, 217, 120, 0.14);
      }
    </style>
  </head>
  <body>
    <main>
      <header class="app-header">
        <div class="tab-strip" role="tablist" aria-label="Token Status Tabs">
          <button id="tab-tokens" class="tab-button is-active" type="button" role="tab" aria-selected="true" data-tab="tokens">Tokens</button>
          <button id="tab-settings" class="tab-button" type="button" role="tab" aria-selected="false" data-tab="settings">Settings</button>
        </div>
      </header>

      <div class="app-content">
        <div id="panel-tokens" class="tab-panel stack" role="tabpanel" aria-labelledby="tab-tokens">
          <section class="stack">
            <h2>Selected</h2>
            <p id="selected-token-empty">Select a character token in the scene.</p>
            <ul id="selected-token-list" class="token-list"></ul>
          </section>

          <section class="stack">
            <h2>Tokens in Scene</h2>
            <div class="section-actions">
              <button id="clean-blood-button" type="button">Clean Blood</button>
            </div>
            <p id="scene-token-empty">No character tokens in this scene.</p>
            <ul id="scene-token-list" class="token-list"></ul>
          </section>
        </div>

        <div id="panel-settings" class="tab-panel stack" role="tabpanel" aria-labelledby="tab-settings" hidden>
          <section class="stack">
            <h2>Settings</h2>
            <div class="setting-row">
              <div class="setting-row__header">
                <span>Bloodyness</span>
                <span id="bloodyness-value" class="setting-row__value">None</span>
              </div>
              <input id="bloodyness-slider" class="ui-slider" type="range" min="0.5" max="1.25" step="0.05" value="0.5" />
              <div class="setting-row__range">
                <span>None</span>
                <span>Bloody Mess</span>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
