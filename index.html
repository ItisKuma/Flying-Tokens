<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Status</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", sans-serif;
        background: #171924;
        color: #f3f4f8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 16px;
        background:
          radial-gradient(circle at top, rgba(111, 140, 255, 0.18), transparent 32%),
          #171924;
      }

      main {
        display: grid;
        gap: 16px;
      }

      section {
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 20px;
      }

      h2 {
        font-size: 14px;
        margin-bottom: 10px;
        color: #bfc7ff;
      }

      p {
        color: #b5b9ca;
        line-height: 1.4;
      }

      button,
      input[type="range"] {
        width: 100%;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        color: inherit;
        background: #657cff;
        cursor: pointer;
      }

      button:hover {
        background: #7890ff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .flying-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
      }

      .flying-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.18);
      }

      .flying-row__info {
        display: grid;
        gap: 4px;
      }

      .flying-row__top {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .flying-row__name {
        font-weight: 600;
      }

      .flying-row__height {
        color: #ffd978;
        font-size: 13px;
        font-weight: 700;
      }

      .flying-row__slider {
        grid-column: 1 / -1;
      }

      .ui-slider {
        appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        outline: none;
        transition: background 120ms ease, box-shadow 120ms ease;
      }

      .ui-slider:hover,
      .ui-slider:focus-visible,
      .ui-slider:active {
        background: rgba(255, 217, 120, 0.26);
        box-shadow: 0 0 0 1px rgba(255, 217, 120, 0.24);
      }

      .ui-slider::-webkit-slider-thumb {
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 2px solid rgba(15, 17, 24, 0.8);
        background: #d9def7;
        box-shadow: 0 0 0 0 rgba(255, 217, 120, 0);
        transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
        cursor: ew-resize;
      }

      .ui-slider::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 2px solid rgba(15, 17, 24, 0.8);
        background: #d9def7;
        box-shadow: 0 0 0 0 rgba(255, 217, 120, 0);
        transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
        cursor: ew-resize;
      }

      .ui-slider:hover::-webkit-slider-thumb,
      .ui-slider:focus-visible::-webkit-slider-thumb,
      .ui-slider:active::-webkit-slider-thumb {
        transform: scale(1.12);
        background: #ffd978;
        box-shadow: 0 0 0 6px rgba(255, 217, 120, 0.14);
      }

      .ui-slider:hover::-moz-range-thumb,
      .ui-slider:focus-visible::-moz-range-thumb,
      .ui-slider:active::-moz-range-thumb {
        transform: scale(1.12);
        background: #ffd978;
        box-shadow: 0 0 0 6px rgba(255, 217, 120, 0.14);
      }

      .flying-row__controls {
        display: flex;
        gap: 8px;
      }

      .flying-row__controls button {
        width: auto;
        min-width: 52px;
        padding-inline: 10px;
        background: rgba(101, 124, 255, 0.2);
        border: 1px solid rgba(148, 164, 255, 0.28);
      }

      .flying-row__controls button:hover {
        background: rgba(101, 124, 255, 0.32);
      }

      .flying-row__secondary-action {
        min-width: 68px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .switch {
        position: relative;
        width: 48px;
        height: 28px;
        flex: 0 0 auto;
      }

      .switch input {
        position: absolute;
        inset: 0;
        opacity: 0;
        margin: 0;
      }

      .switch__track {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        transition: background 120ms ease;
      }

      .switch__thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        background: #f3f4f8;
        transition: transform 120ms ease;
      }

      .switch input:checked + .switch__track {
        background: rgba(101, 124, 255, 0.9);
      }

      .switch input:checked + .switch__track .switch__thumb {
        transform: translateX(20px);
      }

      .float-animation {
        display: grid;
        gap: 10px;
      }

      .float-animation__header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .float-animation__value {
        color: #ffd978;
        font-weight: 700;
        font-size: 13px;
      }

    </style>
  </head>
  <body>
    <main>
      <section class="float-animation">
        <div class="toggle-row">
          <div>
            <h2>Float Animation</h2>
            <p>Animate visual height only. Metadata z stays unchanged.</p>
          </div>
          <label class="switch" aria-label="Toggle float animation">
            <input id="float-animation-toggle" type="checkbox" />
            <span class="switch__track">
              <span class="switch__thumb"></span>
            </span>
          </label>
        </div>
        <div class="float-animation__header">
          <span>Amplitude</span>
          <span id="float-animation-amplitude-value" class="float-animation__value">5 ft</span>
        </div>
        <input
          id="float-animation-amplitude"
          class="ui-slider"
          type="range"
          min="1"
          max="10"
          step="1"
          value="5"
        />
      </section>

      <section class="stack">
        <h2>Token Status</h2>
        <p id="flying-empty">No active token statuses in this scene.</p>
        <ul id="flying-list" class="flying-list"></ul>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
